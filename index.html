<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Detetive Digital</title>
    <link rel="stylesheet" href="style-jogo.css">
</head>
<body>

    <div class="container-jogo">
        <h1>🕵️‍♂️ Desafio Detetive Digital</h1>
        <p>Analise a situação e descubra se a mídia é Real ou uma Deepfake/Fake News!</p>
        
        <div id="caixa-jogo">
            <div id="pergunta">Carregando pergunta...</div>
            
            <div class="opcoes">
                <button onclick="verificarResposta(true)">🟢 Verdadeiro / Real</button>
                <button onclick="verificarResposta(false)">🔴 Falso / Deepfake</button>
            </div>
            
            <div id="feedback" class="escondido"></div>
        </div>

        <div id="resultado-final" class="escondido">
            <h2>Fim do Jogo!</h2>
            <p id="pontuacao"></p>
            <button onclick="reiniciarJogo()">Jogar Novamente 🔄</button>
        </div>
    </div>

    <script src="script-jogo.js"></script>
</body>
</html>
