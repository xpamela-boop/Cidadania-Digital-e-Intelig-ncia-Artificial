<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consciência Digital 2026</title>
    <style>
        /* Estilos Globais e Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        /* Barra de Navegação */
        header {
            background-color: #0d233a;
            color: #fff;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            font-size: 24px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #00d2ff;
        }

        /* Banner Principal (Hero) */
        .hero {
            background: linear-gradient(135deg, #0d233a 0%, #00d2ff 100%);
            color: white;
            text-align: center;
            padding: 150px 20px 80px 20px;
        }

        .hero h2 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
        }

        /* Seção do Jogo */
        .game-section {
            padding: 80px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .game-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            margin-top: 30px;
        }

        .question {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .options-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            color: white;
            width: 180px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-fake { background-color: #e74c3c; }
        .btn-fake:hover { background-color: #c0392b; }

        .btn-fato { background-color: #2ecc71; }
        .btn-fato:hover { background-color: #27ae60; }

        .btn-restart {
            background-color: #0d233a;
            padding: 12px 25px;
            font-size: 16px;
        }

        /* Feedback visual */
        .feedback {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            min-height: 27px;
        }

        .correct { color: #27ae60; }
        .wrong { color: #c0392b; }

        .score-container {
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Consciência Digital 2026</h1>
        <nav>
            <a href="#inicio">Sobre o Tema</a>
            <a href="#identificar">Como Identificar</a>
            <a href="#jogo">Desafio Fake ou Fato</a>
        </nav>
    </header>

    <section class="hero" id="inicio">
        <h2>Cidadania Digital e Inteligência Artificial</h2>
        <p>O impacto das Deepfakes e da desinformação na nossa sociedade. Aprenda a navegar com segurança!</p>
    </section>
