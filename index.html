<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Detetive Digital</title>
    <link rel="stylesheet" href="style-jogo.css">
</head>
<body>

    <main class="container-jogo">
        <header>
            <h1>🕵️‍♂️ Desafio Detetive Digital</h1>
            <p>Analise os cenários e descubra se a mídia é Real ou uma Deepfake/Fake News!</p>
        </header>
        
        <section id="caixa-jogo">
            <div id="progresso">Pergunta 1 de 3</div>
            <div id="pergunta">Carregando pergunta...</div>
            
            <div class="opcoes">
                <button id="btn-verdadeiro" onclick="verificarResposta(true)">🟢 Verdadeiro / Real</button>
                <button id="btn-falso" onclick="verificarResposta(false)">🔴 Falso / Deepfake</button>
            </div>
            
            <div id="container-feedback" class="escondido">
                <div id="feedback"></div>
                <button id="btn-proximo" onclick="avancarPergunta()">Avançar ➡️</button>
            </div>
        </section>

        <section id="resultado-final" class="escondido">
            <h2>Desafio Concluído!</h2>
            <p id="pontuacao"></p>
            <button class="btn-reiniciar" onclick="reiniciarJogo()">Jogar Novamente 🔄</button>
        </section>
    </main>

    <script src="script-jogo.js"></script>
</body>
</html>
